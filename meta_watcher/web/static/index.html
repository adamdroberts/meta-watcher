<!DOCTYPE html><html lang="en"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="color-scheme" content="dark"><title>Meta Watcher</title><style>:root{color-scheme:dark;--bg: #0b0d10;--panel: #121519;--panel-border: #222830;--text: #e8ecef;--muted: #9aa4ad;--accent: #5aa7ff;--danger: #ff6b6b;--ok: #52c77a;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif}*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);height:100%}.layout{display:grid;grid-template-columns:minmax(0,3fr) minmax(320px,2fr);gap:16px;padding:16px;min-height:100vh}.video-panel{background:#000;border:1px solid var(--panel-border);border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:640px;overflow:hidden}.video-panel img{max-width:100%;max-height:100%;object-fit:contain;display:block}.control-panel{background:var(--panel);border:1px solid var(--panel-border);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 32px);overflow-y:auto}h1{font-size:18px;margin:0 0 8px;letter-spacing:.4px}.status{display:flex;flex-direction:column;gap:2px;font-size:13px}.status .label{color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.6px}.status .value{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}form.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}form.controls label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}form.controls label.full{grid-column:1 / -1}form.controls input,form.controls select{background:#0e1115;border:1px solid var(--panel-border);color:var(--text);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:13px}form.controls input[type=checkbox]{width:16px;height:16px;padding:0}.buttons{display:flex;gap:8px;grid-column:1 / -1}button{background:#1c2128;color:var(--text);border:1px solid var(--panel-border);border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px;transition:background .12s}button:hover:not(:disabled){background:#242a32}button.primary{background:var(--accent);color:#0b1220;border-color:transparent}button.danger{background:var(--danger);color:#1a0606;border-color:transparent}button:disabled{opacity:.4;cursor:not-allowed}.inventory,.clips{background:#0e1115;border:1px solid var(--panel-border);border-radius:6px;padding:8px;max-height:200px;overflow-y:auto;font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.inventory li{list-style:none;padding:2px 0}.clips{white-space:pre-wrap;word-break:break-all}.banner{background:var(--danger);color:#1a0606;padding:8px 12px;border-radius:6px;font-size:13px;display:none}.banner.visible{display:block}.mode-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:#2a313a;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}.mode-pill[data-mode=person_present]{background:var(--ok);color:#052810}.mode-pill[data-mode=inventory]{background:var(--accent);color:#071a30}.mode-pill[data-mode=cooldown]{background:#c9a227;color:#2a1e00}
</style></head> <body> <main class="layout"> <section class="video-panel" aria-label="Video stream"> <img id="video-stream" src="/stream.mjpg" alt="Meta Watcher video stream"> </section> <aside class="control-panel" aria-label="Operator controls"> <h1>Meta Watcher</h1> <div id="error-banner" class="banner" role="alert"></div> <div class="status"> <span class="label">Mode</span> <span class="value"><span id="status-mode" class="mode-pill" data-mode="idle">idle</span></span> </div> <div class="status"> <span class="label">Status</span> <span id="status-text" class="value">idle</span> </div> <div class="status"> <span class="label">Recording</span> <span id="status-recording" class="value">idle</span> </div> <form id="controls" class="controls"> <label> <span>Source kind</span> <select name="source_kind"> <option value="webcam">webcam</option> <option value="rtsp">rtsp</option> <option value="file">file</option> </select> </label> <label> <span>Source value</span> <span style="display:flex; gap:6px; align-items:center;"> <select name="webcam_device" style="flex:1; display:none;"></select> <input type="text" name="source_value" autocomplete="off" style="flex:1;"> <button id="btn-refresh-cams" type="button" title="Re-scan webcams" style="padding:4px 8px;">↻</button> </span> </label> <label class="full"> <span>Output directory</span> <input type="text" name="output_dir" autocomplete="off"> </label> <label> <span>Person threshold</span> <input type="number" name="person_threshold" min="0" max="1" step="0.05"> </label> <label> <span>Inventory threshold</span> <input type="number" name="inventory_threshold" min="0" max="1" step="0.05"> </label> <label class="full"> <span>Inventory labels (comma-separated)</span> <input type="text" name="inventory_labels" autocomplete="off" placeholder="e.g. chair, laptop, book, bottle"> </label> <label> <span>&nbsp;</span> <span style="display:flex; gap:12px; align-items:center; padding-top:4px;"> <label style="flex-direction:row; align-items:center; gap:6px; color:var(--text);"> <input type="checkbox" name="auto_rescan"> <span>Auto rescan</span> </label> <label style="flex-direction:row; align-items:center; gap:6px; color:var(--text);"> <input type="checkbox" name="recording_enabled" checked> <span>Record clips</span> </label> </span> </label> <div class="buttons"> <button id="btn-start" type="submit" class="primary">Start</button> <button id="btn-stop" type="button" class="danger" disabled>Stop</button> <button id="btn-rescan" type="button" disabled>Manual rescan</button> </div> </form> <div> <div class="status"><span class="label">Frozen scene inventory</span></div> <ul id="inventory-list" class="inventory" aria-live="polite"></ul> </div> <div> <div class="status"><span class="label">Completed clips</span></div> <div id="completed-clips" class="clips" aria-live="polite"></div> </div> </aside> </main> <script type="module" src="/_astro/index.astro_astro_type_script_index_0_lang.7KZG_aQ2.js"></script> </body> </html>
